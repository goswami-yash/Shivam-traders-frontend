server {
  listen 80;
  server_name _;

  # 🩺 Health check for AWS
  location = /favicon_hc.ico {
    access_log off;
    return 200 'OK';
    add_header Content-Type text/plain;
  }

  # Optional dedicated /health endpoint
  location = /health {
    access_log off;
    return 200 'OK';
    add_header Content-Type text/plain;
  }

  # 🔒 Redirect HTTP → HTTPS (respect AWS ELB headers)
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  # -------------------------
  # 📦 Static File Serving
  # -------------------------
  root /usr/share/nginx/html;
  index index.html;

  # Vite generates hashed assets:
  #   assets/*.js  assets/*.css  (fingerprinted)
  # cache them for 1 year
  location ~* ^/assets/.*\.(js|css|svg|png|jpg|jpeg|gif|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # -------------------------
  # 🚀 SPA Route Fallback
  # -------------------------
  # Any route not matching a file → index.html
  location / {
    try_files $uri /index.html;
  }

  # -------------------------
  # 🧠 Security Headers
  # -------------------------
  add_header X-Frame-Options "DENY";
  add_header X-Content-Type-Options "nosniff";
  add_header X-XSS-Protection "1; mode=block";

  # -------------------------
  # ⚡ Enable gzip
  # -------------------------
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;
}

